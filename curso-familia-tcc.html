  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l-align:baseline;animation:tccblink 1s steps(1) infinite;transition:opacity .4s}\n::-webkit-scrollbar{width:10px}::-webkit-scrollbar-track{background:#0a140e}::-webkit-scrollbar-thumb{background:#22402e;border-radius:8px}::-webkit-scrollbar-thumb:hover{background:#2e5540}\n@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}\n<\u002Fstyle>\n<script src=\"c5f62104-302f-447e-b450-e7fb1957acc8\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n<div id=\"tcc-root\" style=\"--bg:#0a140e;--bg2:#0e1c13;--panel:#12241a;--fg:#ece7db;--dim:#93a89b;--accent:#b0313f;--accent2:#d24d5c;--line:rgba(236,231,219,.08);--glow:#1a6b45;background:var(--bg);color:var(--fg);position:relative;overflow-x:hidden;min-height:100vh\">\n\n  <!-- GLOW LAYER -->\n  <div style=\"position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(60% 45% at 78% 8%, color-mix(in srgb, var(--glow) 55%, transparent), transparent 70%),radial-gradient(50% 40% at 12% 88%, color-mix(in srgb, var(--accent) 30%, transparent), transparent 72%);animation:tccglow 9s ease-in-out infinite\"><\u002Fdiv>\n  <!-- GRID LAYER -->\n  <div id=\"tcc-grid\" style=\"position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:clamp(48px,7vw,80px) clamp(48px,7vw,80px);mask-image:radial-gradient(120% 120% at 50% 30%,#000 55%,transparent 100%)\"><\u002Fdiv>\n\n  <!-- CURSOR -->\n  <div id=\"tcc-cursor\" style=\"position:fixed;top:0;left:0;z-index:9998;width:10px;height:10px;border-radius:50%;background:var(--fg);opacity:.7;pointer-events:none;mix-blend-mode:difference;transition:width .3s,height .3s,background .3s,opacity .3s\"><\u002Fdiv>\n\n  <!-- LOADER -->\n  <div id=\"tcc-loader\" style=\"position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity .65s ease\">\n    <div style=\"position:absolute;top:clamp(22px,4vw,44px);left:clamp(22px,5vw,60px);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.22em;color:var(--dim)\">DYNAMIC · MÉTODO T.C.C<\u002Fdiv>\n    <div style=\"position:absolute;top:clamp(22px,4vw,44px);right:clamp(22px,5vw,60px);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.22em;color:var(--dim)\"><span data-load-num=\"\">000<\u002Fspan>% CARREGANDO<\u002Fdiv>\n    <div style=\"font-family:'Instrument Serif',serif;font-size:clamp(64px,15vw,220px);line-height:.9;letter-spacing:-.01em;color:var(--fg)\">T.C.C<\u002Fdiv>\n    <div style=\"margin-top:20px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.22em;color:var(--dim)\">EMPODERANDO FAMÍLIAS · REDEFININDO A CASA<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TOP BAR -->\n  <header style=\"position:fixed;top:0;left:0;right:0;z-index:400;display:flex;justify-content:space-between;align-items:center;padding:clamp(14px,2vw,22px) clamp(18px,5vw,60px);backdrop-filter:blur(10px);background:linear-gradient(to bottom,color-mix(in srgb,var(--bg) 78%,transparent),transparent);mix-blend-mode:normal\">\n    <a href=\"#hero\" style=\"display:flex;align-items:baseline;gap:8px;color:var(--fg)\">\n      <span style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:26px;line-height:1\">Método<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.02em\">T.C.C<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:none;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--dim)\" data-desk=\"\">GARANTIA INCONDICIONAL · 7 DIAS<\u002Fdiv>\n    <a href=\"#oferta\" style=\"display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#fff;font-family:'Archivo';font-weight:600;font-size:14px;padding:12px 22px;border-radius:999px\" style-hover=\"background:var(--accent2);transform:translateY(-1px)\">Quero começar <span style=\"font-family:'Space Mono',monospace\">→<\u002Fspan><\u002Fa>\n  <\u002Fheader>\n\n  <!-- ===================== HERO ===================== -->\n  <section id=\"hero\" style=\"position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(120px,15vh,180px) clamp(22px,6vw,110px) clamp(48px,7vh,90px);max-width:1600px;margin:0 auto\" data-comment-anchor=\"fdcaf18279-section\">\n\n    <h1 style=\"margin:0;font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(48px,10.5vw,172px);line-height:1;letter-spacing:-.015em;color:var(--accent);text-wrap:balance\">\n      <span id=\"tcc-hero-word\" data-full=\"Tudo Começa em Casa\">Tudo Começa em Casa<\u002Fspan>\n    <\u002Fh1>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:clamp(28px,5vw,90px);align-items:flex-end;margin-top:clamp(28px,4vh,56px)\">\n      <div style=\"flex:1 1 420px;min-width:300px\">\n        <p style=\"font-family:'Archivo';font-weight:600;font-size:clamp(20px,2.4vw,30px);line-height:1.25;color:var(--fg);max-width:640px;text-wrap:pretty\">Desenvolva filhos emocionalmente seguros dentro de casa.<\u002Fp>\n        <p style=\"margin-top:18px;font-size:clamp(15px,1.5vw,18px);line-height:1.6;color:var(--dim);max-width:560px;text-wrap:pretty\">O método que já ajudou famílias reais a saírem do automático e reconstruir um ambiente familiar onde os filhos se sentem seguros e ouvidos.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:20px;margin-top:32px\">\n          <a href=\"#oferta\" style=\"display:inline-flex;align-items:center;gap:12px;background:var(--accent);color:#fff;font-family:'Archivo';font-weight:600;font-size:17px;padding:19px 34px;border-radius:999px\" style-hover=\"background:var(--accent2);transform:translateY(-2px)\">Começar agora <span style=\"font-family:'Space Mono',monospace\">→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- side image slots -->\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;flex:0 1 auto\">\n        <div style=\"position:relative;width:clamp(90px,10vw,150px);height:clamp(120px,14vw,200px);border:1px solid var(--line);border-radius:6px;overflow:hidden\">\n          <image-slot id=\"tcc-hero-a\" shape=\"rect\" src=\"f7aae6a2-5d3b-4add-af06-3ea4d9816725\" placeholder=\"foto família\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"position:relative;width:clamp(90px,10vw,150px);height:clamp(120px,14vw,200px);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-top:26px\">\n          <image-slot id=\"tcc-hero-b\" shape=\"rect\" src=\"f9373b8f-c0b0-4a5e-9ba3-1d747edfec3d\" placeholder=\"foto família\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"position:relative;width:clamp(90px,10vw,150px);height:clamp(120px,14vw,200px);border:1px solid var(--line);border-radius:6px;overflow:hidden\">\n          <image-slot id=\"tcc-hero-c\" shape=\"rect\" src=\"2da40e85-ded7-49ad-800e-c55ba4f2d1a4\" placeholder=\"foto família\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- MARQUEE -->\n  <div style=\"position:relative;z-index:1;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 0;overflow:hidden\">\n    <div class=\"tcc-mqtrack\" style=\"font-family:'Instrument Serif',serif;font-size:clamp(30px,5vw,64px);color:var(--fg)\">\n      <span style=\"padding:0 .5em\">Tudo começa em casa<\u002Fspan><span style=\"padding:0 .5em;color:var(--accent2)\">—<\u002Fspan><span style=\"padding:0 .5em\">Família Monteiro<\u002Fspan><span style=\"padding:0 .5em;color:var(--accent2)\">—<\u002Fspan><span style=\"padding:0 .5em\">Método T.C.C<\u002Fspan><span style=\"padding:0 .5em;color:var(--accent2)\">—<\u002Fspan>\n      <span style=\"padding:0 .5em\">Tudo começa em casa<\u002Fspan><span style=\"padding:0 .5em;color:var(--accent2)\">—<\u002Fspan><span style=\"padding:0 .5em\">Família Monteiro<\u002Fspan><span style=\"padding:0 .5em;color:var(--accent2)\">—<\u002Fspan><span style=\"padding:0 .5em\">Método T.C.C<\u002Fspan><span style=\"padding:0 .5em;color:var(--accent2)\">—<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== ABERTURA / VSL ===================== -->\n  <section id=\"sobre\" style=\"position:relative;z-index:1;max-width:1580px;margin:0 auto;padding:clamp(52px,8vh,104px) clamp(22px,6vw,110px)\">\n    <p class=\"reveal\" style=\"font-family:'Instrument Serif',serif;font-size:clamp(30px,5vw,72px);line-height:1.06;letter-spacing:-.01em;color:var(--fg);max-width:1100px;text-wrap:balance\">A maior parte dos pais educa copiando o único modelo que teve em casa — <span style=\"color:var(--accent2)\">sem nunca ter escolhido esse padrão conscientemente.<\u002Fspan><\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:clamp(30px,5vw,80px);margin-top:clamp(40px,7vh,80px)\">\n      <p class=\"reveal\" style=\"flex:1 1 380px;font-size:clamp(16px,1.6vw,19px);line-height:1.65;color:var(--dim);text-wrap:pretty\">Cada correção feita no automático ensina ao filho um jeito de lidar com conflito que ele vai repetir sozinho daqui a alguns anos. Dá pra trocar esse padrão antes que ele vire hábito fixo.<\u002Fp>\n      <p class=\"reveal\" style=\"flex:1 1 380px;font-size:clamp(16px,1.6vw,19px);line-height:1.65;color:var(--fg);text-wrap:pretty\"><strong>Tudo começa em casa<\u002Fstrong> existe pra isso: reorganizar primeiro o ambiente, depois o comportamento — não o contrário.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===================== PARA QUEM (acordeão) ===================== -->\n  <section style=\"position:relative;z-index:1;max-width:1580px;margin:0 auto;padding:clamp(44px,6vh,80px) clamp(22px,6vw,110px)\">\n    <div class=\"reveal\" style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:clamp(40px,6vh,70px)\">\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(40px,7.5vw,120px);line-height:.92;letter-spacing:-.02em;color:var(--fg)\">Para quem<br>é esse curso<\u002Fh2>\n      <span style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--dim)\" data-comment-anchor=\"445e8ea28b-span\">CLIQUE PARA ABRIR<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:24px;padding:clamp(24px,3vw,38px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\">\n          <span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(19px,2.4vw,30px);line-height:1.15\">Pai ou mãe ausente por excesso de trabalho<\u002Fspan>\n          <span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:26px;line-height:1;color:var(--accent2);transition:transform .35s\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 clamp(24px,3vw,38px) clamp(50px,6vw,84px);font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim);max-width:900px\">Passa a maior parte do dia fora trabalhando e sente que perdeu proximidade com os filhos. Carrega culpa por não estar presente nos momentos importantes e teme que essa distância se torne permanente conforme os filhos crescem.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:24px;padding:clamp(24px,3vw,38px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\">\n          <span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(19px,2.4vw,30px);line-height:1.15\">Mãe sobrecarregada emocionalmente<\u002Fspan>\n          <span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:26px;line-height:1;color:var(--accent2);transition:transform .35s\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 clamp(24px,3vw,38px) clamp(50px,6vw,84px);font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim);max-width:900px\">Responsável pela maior parte da rotina emocional da casa, sente que está sempre apagando incêndios comportamentais dos filhos sem tempo para cuidar de si mesma. Vive em estado de alerta constante e sente que perdeu a paciência que tinha antes.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:24px;padding:clamp(24px,3vw,38px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\">\n          <span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(19px,2.4vw,30px);line-height:1.15\">Casal em conflito por diferenças na educação dos filhos<\u002Fspan>\n          <span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:26px;line-height:1;color:var(--accent2);transition:transform .35s\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 clamp(24px,3vw,38px) clamp(50px,6vw,84px);font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim);max-width:900px\">Pais casados ou em união estável que discordam sobre limites, disciplina e valores a serem passados aos filhos, gerando brigas frequentes e mensagens contraditórias em casa. Sentem que a falta de alinhamento está prejudicando o ambiente familiar.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:24px;padding:clamp(24px,3vw,38px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\">\n          <span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(19px,2.4vw,30px);line-height:1.15\">Pai ou mãe recomeçando após separação<\u002Fspan>\n          <span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:26px;line-height:1;color:var(--accent2);transition:transform .35s\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 clamp(24px,3vw,38px) clamp(50px,6vw,84px);font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim);max-width:900px\">Divorciado, com guarda compartilhada ou não, sente dificuldade em manter consistência emocional e disciplina com os filhos entre duas casas. Teme que a separação tenha causado danos emocionais permanentes.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:24px;padding:clamp(24px,3vw,38px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\">\n          <span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(19px,2.4vw,30px);line-height:1.15\">Pai ou mãe de adolescente distante<\u002Fspan>\n          <span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:26px;line-height:1;color:var(--accent2);transition:transform .35s\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 clamp(24px,3vw,38px) clamp(50px,6vw,84px);font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim);max-width:900px\">Filho entre 12 e 17 anos, percebe o distanciamento típico da adolescência se transformando em silêncio total e falta de diálogo. Sente que perdeu o vínculo que tinha quando os filhos eram menores e não sabe como reabrir essa comunicação.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== MÉTODO / 4 FUNDAMENTOS ===================== -->\n  <section id=\"metodo\" style=\"position:relative;z-index:1;max-width:1580px;margin:0 auto;padding:clamp(52px,8vh,104px) clamp(22px,6vw,110px)\">\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:30px;margin-bottom:clamp(40px,6vh,70px)\">\n      <h2 class=\"reveal\" style=\"font-family:'Archivo';font-weight:800;font-size:clamp(40px,8vw,130px);line-height:.9;letter-spacing:-.02em;color:var(--fg)\">O método,<br>em 4 fundamentos<\u002Fh2>\n      <p class=\"reveal\" style=\"flex:0 1 380px;font-size:clamp(15px,1.5vw,18px);line-height:1.6;color:var(--dim);text-wrap:pretty\">Aqui você não caminha sozinho. A Família Monteiro acompanha sua família lado a lado, a cada etapa — não é só curso gravado, é conexão direta com quem já aplicou os 4 fundamentos na própria casa.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"border-top:1px solid var(--line)\">\n      <div class=\"reveal\" style=\"display:flex;align-items:baseline;gap:clamp(20px,4vw,60px);padding:clamp(26px,3.5vw,44px) 0;border-bottom:1px solid var(--line)\" style-hover=\"background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:13px;color:var(--accent2);flex:0 0 auto\">(01)<\u002Fspan>\n        <div style=\"flex:1\"><h3 style=\"font-family:'Instrument Serif',serif;font-size:clamp(28px,4vw,58px);line-height:1;color:var(--fg)\">Governo dos Pais<\u002Fh3><p style=\"margin-top:12px;font-size:clamp(15px,1.5vw,18px);line-height:1.55;color:var(--dim);max-width:640px\">Você assume a liderança emocional da casa antes de corrigir o filho.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:flex;align-items:baseline;gap:clamp(20px,4vw,60px);padding:clamp(26px,3.5vw,44px) 0;border-bottom:1px solid var(--line)\" style-hover=\"background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:13px;color:var(--accent2);flex:0 0 auto\">(02)<\u002Fspan>\n        <div style=\"flex:1\"><h3 style=\"font-family:'Instrument Serif',serif;font-size:clamp(28px,4vw,58px);line-height:1;color:var(--fg)\">Cultura da Casa<\u002Fh3><p style=\"margin-top:12px;font-size:clamp(15px,1.5vw,18px);line-height:1.55;color:var(--dim);max-width:640px\">Rotina e rituais que sustentam esse governo no dia a dia.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:flex;align-items:baseline;gap:clamp(20px,4vw,60px);padding:clamp(26px,3.5vw,44px) 0;border-bottom:1px solid var(--line)\" style-hover=\"background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:13px;color:var(--accent2);flex:0 0 auto\">(03)<\u002Fspan>\n        <div style=\"flex:1\"><h3 style=\"font-family:'Instrument Serif',serif;font-size:clamp(28px,4vw,58px);line-height:1;color:var(--fg)\">Identidade dos Filhos<\u002Fh3><p style=\"margin-top:12px;font-size:clamp(15px,1.5vw,18px);line-height:1.55;color:var(--dim);max-width:640px\">O filho desenvolve segurança a partir do ambiente já estruturado.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:flex;align-items:baseline;gap:clamp(20px,4vw,60px);padding:clamp(26px,3.5vw,44px) 0;border-bottom:1px solid var(--line)\" style-hover=\"background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:13px;color:var(--accent2);flex:0 0 auto\">(04)<\u002Fspan>\n        <div style=\"flex:1\"><h3 style=\"font-family:'Instrument Serif',serif; e;z-index:1;max-width:1580px;margin:0 auto;padding:clamp(44px,6vh,80px) clamp(22px,6vw,110px)\">\n    <div class=\"reveal\" style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:clamp(40px,6vh,70px)\">\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(40px,7.5vw,120px);line-height:.92;letter-spacing:-.02em;color:var(--fg)\">Ainda em<br>dúvida?<\u002Fh2>\n    <\u002Fdiv>\n    <div>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:20px;padding:clamp(22px,3vw,36px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(17px,2.1vw,26px);line-height:1.2\">\"Não tenho tempo para mais um curso na minha rotina\"<\u002Fspan><span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:24px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><div style=\"padding:0 0 clamp(24px,3vw,38px);max-width:940px;display:flex;flex-direction:column;gap:14px;font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim)\"><p>O brasileiro médio passa mais de duas horas por dia em redes sociais. O curso foi desenhado em videoaulas curtas, pensadas para caber nesse mesmo espaço de tempo que hoje é consumido de forma passiva.<\u002Fp><p>Quanto mais tempo se passa sem endereçar o comportamento dos filhos, maior é o tempo gasto depois corrigindo crises e conflitos já instalados. É como adiar uma manutenção pequena no carro: 15 a 20 minutos por semana evitam horas de desgaste emocional futuro.<\u002Fp><p>Juliana, mãe de dois e gerente de loja, assistia às aulas no intervalo do almoço. Em oito semanas, as conversas com os filhos à noite ficaram mais tranquilas.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:20px;padding:clamp(22px,3vw,36px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(17px,2.1vw,26px);line-height:1.2\">\"Já tentei outros métodos e nenhum funcionou\"<\u002Fspan><span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:24px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><div style=\"padding:0 0 clamp(24px,3vw,38px);max-width:940px;display:flex;flex-direction:column;gap:14px;font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim)\"><p>A consistência da aplicação é mais determinante para o resultado do que a técnica em si. Tentativas anteriores podem ter falhado pela ausência de continuidade e acompanhamento — não pela abordagem.<\u002Fp><p>Diferente de livros e vídeos avulsos, o valor inclui acompanhamento em grupo ao vivo, onde dúvidas da própria família são esclarecidas em tempo real. É como começar uma dieta sem acompanhamento e desistir na primeira dificuldade.<\u002Fp><p>Com acompanhamento ao vivo, é possível identificar rapidamente o que não funciona e corrigir a rota antes que o desânimo leve a mais uma desistência.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:20px;padding:clamp(22px,3vw,36px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(17px,2.1vw,26px);line-height:1.2\">\"Meu parceiro não vai se engajar nisso\"<\u002Fspan><span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:24px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><div style=\"padding:0 0 clamp(24px,3vw,38px);max-width:940px;display:flex;flex-direction:column;gap:14px;font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim)\"><p>Quando um dos responsáveis muda a forma de se comunicar, o ambiente familiar tende a se ajustar — mesmo sem o engajamento formal do outro no início. É como reformar a casa começando por um único cômodo.<\u002Fp><p>Patrícia começou sozinha. Depois de um mês, o marido notou a mudança e pediu para assistir às aulas junto. Começar sozinho agora gera resultados visíveis que, na prática, são o maior incentivo para o engajamento do outro.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:20px;padding:clamp(22px,3vw,36px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(17px,2.1vw,26px);line-height:1.2\">\"Meu filho já é adolescente, é tarde demais\"<\u002Fspan><span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:24px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><div style=\"padding:0 0 clamp(24px,3vw,38px);max-width:940px;display:flex;flex-direction:column;gap:14px;font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim)\"><p>A adolescência é marcada por alta plasticidade neural: mudanças de comportamento e vínculo ainda são plenamente possíveis. A idade não é barreira definitiva pra reconstruir proximidade.<\u002Fp><p>Quem acredita que é tarde geralmente continua buscando formas de se aproximar do filho — o que já mostra que não desistiu. O investimento é muito menor que o custo de terapia familiar especializada, e o retorno em vínculo se estende por toda a vida adulta do filho.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n        <div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:20px;padding:clamp(22px,3vw,36px) 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(17px,2.1vw,26px);line-height:1.2\">\"Não sei se um curso online resolve algo tão profundo\"<\u002Fspan><span data-acc-icon=\"\" style=\"flex:0 0 auto;font-size:24px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv>\n        <div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><div style=\"padding:0 0 clamp(24px,3vw,38px);max-width:940px;display:flex;flex-direction:column;gap:14px;font-size:clamp(15px,1.5vw,18px);line-height:1.65;color:var(--dim)\"><p>A mudança está mais ligada à consistência da aplicação do que ao formato de entrega. O curso foi estruturado pra sustentar essa consistência: aulas gravadas para revisão e encontros ao vivo para dúvidas. É como aprender um instrumento por aulas online — o formato não impede o aprendizado real.<\u002Fp><p>Patrícia duvidava. Depois das primeiras aulas e de um encontro ao vivo, o filho mais novo passou a compartilhar sentimentos em casa — a ponto de comentar: \"minha mãe está até mais bonita\".<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== GARANTIA + URGÊNCIA ===================== -->\n  <section style=\"position:relative;z-index:1;max-width:1580px;margin:0 auto;padding:clamp(44px,6vh,80px) clamp(22px,6vw,110px);display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:clamp(18px,2.5vw,32px)\">\n    <div class=\"reveal\" style=\"border:1px solid var(--line);border-radius:16px;padding:clamp(30px,4vw,52px);background:var(--panel)\">\n      <div style=\"width:60px;height:60px;border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent2);font-size:26px;margin-bottom:24px\">✓<\u002Fdiv>\n      <h3 style=\"font-family:'Instrument Serif',serif;font-size:clamp(28px,3.6vw,48px);line-height:1;color:var(--fg)\">Garantia incondicional de 7 dias<\u002Fh3>\n      <p style=\"margin-top:18px;font-size:clamp(15px,1.5vw,18px);line-height:1.6;color:var(--dim)\">Você acessa o curso, assiste às primeiras aulas do fundamento Governo dos Pais e aplica em casa. Se em 7 dias decidir que não é pra você, devolvemos 100% do valor — sem formulário e sem precisar justificar.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"reveal\" style=\"border:1px solid var(--accent);border-radius:16px;padding:clamp(30px,4vw,52px);background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 16%,var(--panel)),var(--panel))\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--accent2);margin-bottom:24px\">⚠ VAGAS LIMITADAS<\u002Fdiv>\n      <h3 style=\"font-family:'Instrument Serif',serif;font-size:clamp(28px,3.6vw,48px);line-height:1;color:var(--fg)\">O Bônus 1 tem vagas limitadas por turma<\u002Fh3>\n      <p style=\"margin-top:18px;font-size:clamp(15px,1.5vw,18px);line-height:1.6;color:var(--dim)\">O Zoom mensal com a Família Monteiro acontece em grupo, então o número de famílias por turma é limitado. A oferta com esse bônus incluso pode se encerrar a qualquer momento, sem aviso prévio.<\u002Fp>\n      <a href=\"#oferta\" style=\"display:inline-flex;align-items:center;gap:10px;margin-top:28px;background:var(--accent);color:#fff;font-family:'Archivo';font-weight:600;font-size:16px;padding:16px 28px;border-radius:999px\" style-hover=\"background:var(--accent2)\">Garantir minha vaga no Zoom <span style=\"font-family:'Space Mono',monospace\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FAQ ===================== -->\n  <section id=\"faq\" style=\"position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:clamp(44px,6vh,80px) clamp(22px,6vw,110px)\">\n    <h2 class=\"reveal\" style=\"font-family:'Archivo';font-weight:800;font-size:clamp(36px,6vw,84px);line-height:.95;letter-spacing:-.02em;color:var(--fg);margin-bottom:clamp(34px,5vh,56px)\">Perguntas Frequentes<\u002Fh2>\n    <div>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">Não tenho tempo. Funciona mesmo assim?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">As aulas são curtas, pensadas pra caber no tempo hoje usado passivamente em redes sociais.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">Serve pra pais de criança pequena ou só de adolescente?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">Serve pros dois — muda só a ferramenta usada em cada fundamento.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">E se eu não gostar?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">Garantia incondicional de 7 dias, sem formulário, sem justificar.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">Como funciona o acesso?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">Aulas gravadas na plataforma The Members.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">Como funciona o encontro ao vivo?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">Uma vez por mês, online e ao vivo com a Família Monteiro, durante 90 dias. Cerca de 2 horas, com espaço aberto pra troca entre alunos e mentorados.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">Tem suporte?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">Sim, via WhatsApp.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-acc-item=\"\" style=\"border-top:1px solid var(--line);border-bottom:1px solid var(--line)\"><div data-acc-trigger=\"\" style=\"display:flex;align-items:center;gap:16px;padding:22px 0;cursor:pointer;color:var(--fg)\" style-hover=\"color:var(--accent2)\"><span style=\"flex:1;font-family:'Archivo';font-weight:600;font-size:clamp(16px,1.9vw,22px)\">Quais formas de pagamento?<\u002Fspan><span data-acc-icon=\"\" style=\"font-size:22px;color:var(--accent2);transition:transform .35s\">+<\u002Fspan><\u002Fdiv><div data-acc-panel=\"\" style=\"max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1)\"><p style=\"padding:0 0 24px;font-size:17px;line-height:1.6;color:var(--dim)\">Cartão, Pix ou boleto. R$ 397 à vista ou 12x de R$ 39,70.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== CTA FINAL ===================== -->\n  <section style=\"position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:clamp(90px,16vh,200px) clamp(22px,6vw,110px);text-align:center\">\n    <p class=\"reveal\" style=\"font-family:'Instrument Serif',serif;font-size:clamp(34px,6.5vw,96px);line-height:1.02;letter-spacing:-.01em;color:var(--fg);max-width:1200px;margin:0 auto;text-wrap:balance\">Toda casa já tem um governo. A única pergunta é <span style=\"color:var(--accent2)\">quem está liderando ele hoje<\u002Fspan> — você, ou o piloto automático que aprendeu sem escolher.<\u002Fp>\n    <p class=\"reveal\" style=\"margin:clamp(32px,5vh,56px) auto 0;max-width:760px;font-size:clamp(16px,1.6vw,19px);line-height:1.65;color:var(--dim);text-wrap:pretty\">Daqui a um ano, o jantar em silêncio e o filho que só responde monossílabo podem continuar iguais — ou ser só lembrança do \"antes\". A diferença não é sorte. É começar pelo primeiro fundamento ainda essa semana, com quem já percorreu esse caminho lado a lado.<\u002Fp>\n    <div class=\"reveal\" style=\"display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:clamp(34px,5vh,56px)\">\n      <a href=\"#oferta\" style=\"display:inline-flex;align-items:center;gap:12px;background:var(--accent);color:#fff;font-family:'Archivo';font-weight:700;font-size:clamp(18px,2vw,22px);padding:24px 48px;border-radius:999px\" style-hover=\"background:var(--accent2);transform:translateY(-2px)\">Quero começar hoje <span style=\"font-family:'Space Mono',monospace\">→<\u002Fspan><\u002Fa>\n      <span style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;color:var(--dim)\">GARANTIA DE 7 DIAS · ACOMPANHAMENTO DIRETO COM A FAMÍLIA MONTEIRO<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER / PS ===================== -->\n  <footer style=\"position:relative;z-index:1;border-top:1px solid var(--line);padding:clamp(50px,8vh,90px) clamp(22px,6vw,110px) clamp(120px,14vh,150px);max-width:1580px;margin:0 auto\">\n    <div style=\"border:1px solid var(--line);border-radius:16px;padding:clamp(28px,4vw,48px);background:var(--panel);margin-bottom:clamp(40px,6vh,70px)\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--accent2);margin-bottom:18px\">P.S.<\u002Fdiv>\n      <p style=\"font-size:clamp(17px,1.9vw,24px);line-height:1.5;color:var(--fg);max-width:1000px;text-wrap:pretty\">Filhos seguros não nascem de casas perfeitas — nascem de casas lideradas. Você tem 7 dias pra testar isso sem risco. O Zoom com a Família Monteiro tem vagas limitadas por turma e a oferta pode se encerrar a qualquer momento. Se não fizer sentido pra sua família, devolvemos tudo, sem perguntas.<\u002Fp>\n      <a href=\"#oferta\" style=\"display:inline-flex;align-items:center;gap:10px;margin-top:26px;background:var(--accent);color:#fff;font-family:'Archivo';font-weight:600;font-size:16px;padding:16px 28px;border-radius:999px\" style-hover=\"background:var(--accent2)\">Quero mudar isso agora <span style=\"font-family:'Space Mono',monospace\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;gap:30px;align-items:flex-end\">\n      <div>\n        <div style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:32px;color:var(--fg)\">Método<\u002Fspan><span style=\"font-family:'Archivo';font-weight:800;font-size:28px;letter-spacing:-.02em;color:var(--fg)\">T.C.C<\u002Fspan><\u002Fdiv>\n        <p style=\"margin-top:12px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--dim)\">FAMÍLIA MONTEIRO · @LALAJUBIJU<\u002Fp>\n      <\u002Fdiv>\n      <p style=\"max-width:440px;font-size:12px;line-height:1.6;color:var(--dim)\">Ao continuar, você concorda com os <a href=\"#\">termos de uso<\u002Fa> e a <a href=\"#\">política de privacidade<\u002Fa>, e com o tratamento dos seus dados conforme a LGPD.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===================== BOTTOM NAV (Kurate style) ===================== -->\n  <nav style=\"position:fixed;left:50%;bottom:clamp(14px,2.5vw,26px);transform:translateX(-50%);z-index:500;display:flex;align-items:center;gap:6px;padding:7px;border-radius:999px;background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(14px);border:1px solid var(--line);max-width:calc(100vw - 28px)\">\n    <a href=\"#hero\" style=\"font-family:'Archivo';font-weight:500;font-size:14px;color:var(--fg);padding:9px 16px;border-radius:999px\" style-hover=\"background:var(--panel)\">Início<\u002Fa>\n    <a href=\"#sobre\" style=\"font-family:'Archivo';font-weight:500;font-size:14px;color:var(--dim);padding:9px 16px;border-radius:999px\" style-hover=\"background:var(--panel);color:var(--fg)\">Sobre<\u002Fa>\n    <a href=\"#metodo\" style=\"font-family:'Archivo';font-weight:500;font-size:14px;color:var(--dim);padding:9px 16px;border-radius:999px\" style-hover=\"background:var(--panel);color:var(--fg)\">Método<\u002Fa>\n    <a href=\"#depoimentos\" style=\"font-family:'Archivo';font-weight:500;font-size:14px;color:var(--dim);padding:9px 16px;border-radius:999px\" style-hover=\"background:var(--panel);color:var(--fg)\">Depoimentos<\u002Fa>\n    <a href=\"#oferta\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Archivo';font-weight:600;font-size:14px;color:#fff;background:var(--accent);padding:9px 20px;border-radius:999px\" style-hover=\"background:var(--accent2)\">Oferta →<\u002Fa>\n  <\u002Fnav>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#b0313f&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#b0313f&quot;, &quot;#8f2533&quot;, &quot;#c0405a&quot;, &quot;#7d1f2e&quot;], &quot;section&quot;: &quot;Cores&quot;},\n  &quot;bg&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#0a140e&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#0a140e&quot;, &quot;#0b1512&quot;, &quot;#0d1810&quot;, &quot;#091413&quot;], &quot;section&quot;: &quot;Cores&quot;},\n  &quot;showGrid&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot;},\n  &quot;showLoader&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot;}\n}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const root = document.getElementById('tcc-root');\n    if (!root) return;\n\n    // ---- HLS players (depoimentos) ----\n    this._initHls(root);\n    const p = this.props || {};\n\n    // ---- theme vars from tweaks ----\n    if (p.accent) {\n      root.style.setProperty('--accent', p.accent);\n      // derive a brighter variant for text/highlights\n      root.style.setProperty('--accent2', this._lighten(p.accent, 0.16));\n    }\n    if (p.bg) root.style.setProperty('--bg', p.bg);\n\n    const grid = document.getElementById('tcc-grid');\n    if (grid && p.showGrid === false) grid.style.display = 'none';\n\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    // ---- loader ----\n    const loader = document.getElementById('tcc-loader');\n    const runHero = () => this.startHero(reduce);\n    if (loader && p.showLoader !== false && !reduce) {\n      document.body.style.overflow = 'hidden';\n      const num = loader.querySelector('[data-load-num]');\n      let n = 0;\n      const iv = setInterval(() => {\n        n += Math.floor(Math.random() * 11) + 5;\n        if (n > 100) n = 100;\n        if (num) num.textContent = String(n).padStart(3, '0');\n        if (n >= 100) {\n          clearInterval(iv);\n          setTimeout(() => {\n            loader.style.opacity = '0';\n            loader.style.pointerEvents = 'none';\n            setTimeout(() => { loader.remove(); document.body.style.overflow = ''; runHero(); }, 650);\n          }, 220);\n        }\n      }, 85);\n    } else {\n      if (loader) loader.remove();\n      document.body.style.overflow = '';\n      runHero();\n    }\n\n    // ---- scroll reveal ----\n    const items = Array.from(root.querySelectorAll('.reveal'));\n    if (reduce) {\n      items.forEach(el => el.classList.add('in'));\n    } else {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => {\n          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n      items.forEach(el => io.observe(el));\n      setTimeout(() => items.forEach(el => el.classList.add('in')), 5500);\n    }\n\n    // ---- accordions ----\n    root.querySelectorAll('[data-acc-item]').forEach(item => {\n      const trg = item.querySelector('[data-acc-trigger]');\n      const panel = item.querySelector('[data-acc-panel]');\n      const icon = item.querySelector('[data-acc-icon]');\n      if (!trg || !panel) return;\n      trg.addEventListener('click', () => {\n        const open = !item.hasAttribute('data-open');\n        if (open) {\n          item.setAttribute('data-open', '');\n          panel.style.maxHeight = panel.scrollHeight + 'px';\n          if (icon) icon.style.transform = 'rotate(45deg)';\n        } else {\n          item.removeAttribute('data-open');\n          panel.style.maxHeight = '0px';\n          if (icon) icon.style.transform = 'rotate(0deg)';\n        }\n      });\n    });\n    window.addEventListener('resize', () => {\n      root.querySelectorAll('[data-acc-item][data-open]').forEach(item => {\n        const panel = item.querySelector('[data-acc-panel]');\n        if (panel) panel.style.maxHeight = panel.scrollHeight + 'px';\n      });\n    });\n\n    // ---- desktop-only chrome ----\n    const desk = root.querySelector('[data-desk]');\n    if (desk && window.innerWidth > 900) desk.style.display = 'block';\n\n    // ---- custom cursor ----\n    const fine = window.matchMedia && window.matchMedia('(pointer:fine)').matches;\n    const dot = document.getElementById('tcc-cursor');\n    if (dot && fine && !reduce) {\n      let x = innerWidth / 2, y = innerHeight / 2, cx = x, cy = y;\n      window.addEventListener('mousemove', e => { x = e.clientX; y = e.clientY; });\n      const loop = () => {\n        cx += (x - cx) * 0.16; cy += (y - cy) * 0.16;\n        dot.style.transform = `translate(${cx}px,${cy}px) translate(-50%,-50%)`;\n        requestAnimationFrame(loop);\n      };\n      loop();\n      root.querySelectorAll('a,button,[data-acc-trigger]').forEach(el => {\n        el.addEventListener('mouseenter', () => { dot.style.width = '46px'; dot.style.height = '46px'; dot.style.background = 'var(--accent)'; dot.style.opacity = '.4'; });\n        el.addEventListener('mouseleave', () => { dot.style.width = '10px'; dot.style.height = '10px'; dot.style.background = 'var(--fg)'; dot.style.opacity = '.7'; });\n      });\n    } else if (dot) {\n      dot.style.display = 'none';\n    }\n  }\n\n  _initHls(root) {\n    const vids = Array.from(root.querySelectorAll('video.tcc-hls'));\n    const attach = () => {\n      vids.forEach(v => {\n        if (v._hlsReady) return;\n        const src = v.getAttribute('data-hls');\n        if (!src) return;\n        // Prefer hls.js where supported (Chrome/Android/Firefox); it plays m3u8\n        // reliably. Fall back to native HLS only where hls.js can't run (Safari/iOS).\n        if (window.Hls && window.Hls.isSupported()) {\n          const hls = new window.Hls({ capLevelToPlayerSize: true });\n          hls.loadSource(src);\n          hls.attachMedia(v);\n          v._hlsReady = true;\n        } else if (v.canPlayType('application/vnd.apple.mpegurl')) {\n          v.src = src; v._hlsReady = true;\n        }\n      });\n    };\n    // hls.js may still be loading from CDN — retry until available\n    let tries = 0;\n    const tick = () => {\n      attach();\n      const pending = vids.some(v => !v._hlsReady);\n      if (pending && tries++ < 40) setTimeout(tick, 150);\n    };\n    tick();\n  }\n\n  startHero(reduce) {\n    const word = document.getElementById('tcc-hero-word');\n    if (!word) return;\n    const full = word.getAttribute('data-full') || word.textContent;\n    if (reduce) { word.textContent = full; return; }\n    // letters simply appear (soft blur/opacity fade in) — no caret, no typing\n    word.textContent = '';\n    const spans = [];\n    for (const ch of full) {\n      if (ch === ' ') { word.appendChild(document.createTextNode(' ')); continue; }\n      const s = document.createElement('span');\n      s.textContent = ch;\n      s.style.display = 'inline-block';\n      s.style.opacity = '0';\n      s.style.filter = 'blur(8px)';\n      s.style.transform = 'translateY(6px)';\n      s.style.transition = 'opacity .6s ease, filter .6s ease, transform .6s ease';\n      word.appendChild(s);\n      spans.push(s);\n    }\n    spans.forEach((s, i) => {\n      setTimeout(() => { s.style.opacity = '1'; s.style.filter = 'blur(0)'; s.style.transform = 'none'; }, 150 + i * 55);\n    });\n  }\n\n  _lighten(hex, amt) {\n    try {\n      const h = hex.replace('#', '');\n      const f = h.length === 3 ? h.split('').map(c => c + c).join('') : h;\n      let r = parseInt(f.slice(0, 2), 16), g = parseInt(f.slice(2, 4), 16), b = parseInt(f.slice(4, 6), 16);\n      r = Math.round(r + (255 - r) * amt); g = Math.round(g + (255 - g) * amt); b = Math.round(b + (255 - b) * amt);\n      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');\n    } catch (e) { return hex; }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
