    border-radius: 999px; padding: 9px 18px; font-size: 13px; font-weight: 500;\n    display: flex; align-items: center; gap: 8px; cursor: pointer; z-index: 6;\n    transition: opacity 0.25s ease;\n  }\n  .sound-prompt.hidden { opacity: 0; pointer-events: none; }\n  .cta-zone { width: 100%; margin-top: 30px; display: flex; flex-direction: column; align-items: center; min-height: 96px; }\n  .waiting-note { font-size: 13px; color: var(--muted); text-align: center; display: flex; align-items: center; gap: 8px; }\n  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--clay); animation: pulse 1.4s ease-in-out infinite; }\n  @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }\n  .cta-button {\n    opacity: 0; transform: translateY(8px); pointer-events: none;\n    transition: opacity 0.5s ease, transform 0.5s ease;\n    background: var(--clay); color: #fff; border: none; font-size: 16px; font-weight: 600;\n    padding: 16px 40px; border-radius: 8px; cursor: pointer; width: 100%; max-width: 420px;\n  }\n  .cta-button:hover { background: var(--clay-light); }\n  .cta-button.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }\n  .cta-micro { font-size: 12px; color: var(--muted); margin-top: 10px; opacity: 0; transition: opacity 0.5s ease 0.15s; }\n  .cta-micro.visible { opacity: 1; }\n  footer { margin-top: 40px; margin-bottom: 24px; font-size: 12px; color: var(--muted); text-align: center; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <div class=\"wrap\">\n    <p class=\"eyebrow\">Família Monteiro apresenta<\u002Fp>\n    <h1>Antes de qualquer coisa, assista a esse vídeo até o final<\u002Fh1>\n    <p class=\"sub\">Em poucos minutos você vai entender por que corrigir o comportamento do seu filho sem antes mudar o ambiente de casa nunca funciona de verdade.<\u002Fp>\n\n    <div class=\"video-shell\">\n      <iframe id=\"bunny\" src=\"https://player.mediadelivery.net/embed/695894/fecbe22c-c73d-47bb-9dd3-0c37c6862df4?autoplay=true&amp;loop=false&amp;muted=true&amp;preload=true&amp;responsive=true&amp;controls=false\" loading=\"lazy\" allow=\"accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;fullscreen;\" allowfullscreen=\"true\"><\u002Fiframe>\n      <button class=\"sound-prompt\" id=\"soundPrompt\" aria-label=\"Ativar o som do vídeo\">\n        <span>🔊<\u002Fspan> Toque para ativar o som\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"cta-zone\">\n      <p class=\"waiting-note\" id=\"waitingNote\">\n        <span class=\"dot\"><\u002Fspan> O botão libera assim que o vídeo terminar\n      <\u002Fp>\n      <button class=\"cta-button\" id=\"ctaButton\">Quero começar a mudança na minha casa<\u002Fbutton>\n      <p class=\"cta-micro\" id=\"ctaMicro\">Garantia incondicional de 7 dias · Vagas limitadas no Zoom com a Família Monteiro<\u002Fp>\n    <\u002Fdiv>\n\n    <footer>Tudo começa em casa — Família Monteiro<\u002Ffooter>\n  <\u002Fdiv>\n\n<script src=\"a0647c7b-79ef-4cd7-9c44-bb04381a8d9b\"><\u002Fscript>\n<script>\n  var VARIANT = new URLSearchParams(window.location.search).get('variant') || 'A';\n  // CTA vai para a versão da página SEM a VSL\n  var SALES_PAGE_URL = 'curso-familia-tcc.html' + '?variant=' + VARIANT;\n\n  function track(eventName) {\n    var payload = { event: eventName, variant: VARIANT, page: 'vsl' };\n    if (window.dataLayer) { window.dataLayer.push(payload); }\n    if (window.fbq) { window.fbq('trackCustom', eventName, { variant: VARIANT }); }\n    console.log('[vsl-track]', payload);\n  }\n\n  var soundPrompt = document.getElementById('soundPrompt');\n  var ctaButton = document.getElementById('ctaButton');\n  var ctaMicro = document.getElementById('ctaMicro');\n  var waitingNote = document.getElementById('waitingNote');\n\n  var hasStart = false, unlocked = false, duration = 0, maxAllowedTime = 0, suppressGuardUntil = 0;\n\n  function unlockCTA() {\n    if (unlocked) return; unlocked = true;\n    waitingNote.style.display = 'none';\n    ctaButton.classList.add('visible');\n    ctaMicro.classList.add('visible');\n    track('vsl_cta_shown');\n  }\n\n  ctaButton.addEventListener('click', function () {\n    track('vsl_cta_click');\n    window.location.href = SALES_PAGE_URL;\n  });\n\n  var player = new playerjs.Player(document.getElementById('bunny'));\n  player.on('ready', function () {\n    try { player.getDuration(function (d) { duration = d || 0; }); } catch (e) {}\n    // Dá uma folga logo no início (o player ainda está negociando o autoplay\n    // mudo) pra não disparar a trava de avanço por engano.\n    suppressGuardUntil = Date.now() + 2000;\n\n    player.on('play', function () { if (!hasStart) { track('vsl_video_start'); hasStart = true; } });\n\n    // Trava anti-avanço: monitora o tempo e, se o usuário arrastar/pular\n    // pra frente, devolve pro ponto máximo já assistido. Não intercepta\n    // cliques nem recarrega o player — só corrige a posição. Fica em\n    // pausa (suppressGuardUntil) logo após o ready e após ativar o som,\n    // pra não competir com ajustes internos do player nesses momentos.\n    player.on('timeupdate', function (data) {\n      var cur = (data && (data.seconds != null ? data.seconds : data.currentTime)) || 0;\n      if (data && data.duration) duration = data.duration;\n      if (Date.now() < suppressGuardUntil) {\n        maxAllowedTime = Math.max(maxAllowedTime, cur);\n      } else if (cur > maxAllowedTime + 2) {\n        try { player.setCurrentTime(maxAllowedTime); } catch (e) {}\n      } else {\n        maxAllowedTime = Math.max(maxAllowedTime, cur);\n      }\n      if (duration && cur >= duration - 0.6) unlockCTA();\n    });\n\n    player.on('ended', function () { track('vsl_video_complete'); unlockCTA(); });\n  });\n\n  soundPrompt.addEventListener('click', function () {\n    // Suspende a trava de avanço por um instante: desmutar pode causar um\n    // pequeno ajuste interno de tempo no player do Bunny, e não queremos\n    // que a trava confunda isso com uma tentativa de pular vídeo.\n    suppressGuardUntil = Date.now() + 1500;\n    try { player.unmute(); } catch (e) {}\n    try { player.setVolume(100); } catch (e) {}\n    soundPrompt.classList.add('hidden');\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
